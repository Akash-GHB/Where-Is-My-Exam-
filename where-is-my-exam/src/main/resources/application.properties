spring.application.name=where-is-my-exam

# =============================
# MySQL Database Configuration
# =============================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:where_is_my_exam}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# =============================
# JPA / Hibernate Settings
# =============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================
# Email Configuration
# =============================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:whereismyexam@gmail.com}
spring.mail.password=${SMTP_PASS:nvtdjcxmfaezfsmq}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =============================
# Security Settings
# =============================
jwt.secret=${JWT_SECRET:8972349827349827349827349827349827349827349827349827349827349827}
jwt.expiration=86400000

# =============================
# Server Port
# =============================
server.port=${PORT:8080}

# Optional: DevTools automatic reload
spring.devtools.restart.enabled=true

# =============================
